<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" width="820" height="400" font-family="system-ui, -apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
<rect x="1" y="1" width="818" height="398" rx="14" fill="#fcfcfb" stroke="rgba(11,11,11,0.10)"/>
<text x="34" y="42" font-size="20" font-weight="700" fill="#0b0b0b">재귀 호출 스택: 깊이 n만큼 프레임이 쌓인다 → O(n)</text>
<text x="34" y="64" font-size="12.5" fill="#52514e">factorial(4)는 base case에 닿기 전까지 프레임 4개가 동시에 스택에 남아 있다</text>
<rect x="70" y="110" width="210" height="46" rx="8" fill="#e8f1fc" stroke="#2a78d6" stroke-width="1.5"/>
<text x="86" y="130" font-size="13.5" font-weight="700" fill="#0b0b0b">factorial(4)</text>
<text x="86" y="148" font-size="11.5" fill="#52514e">4 * factorial(3)</text>
<path d="M175.0,156 L175.0,176" stroke="#eb6834" stroke-width="1.8"/>
<path d="M170.0,169 L180.0,169 L175.0,175 Z" fill="#eb6834"/>
<rect x="70" y="176" width="210" height="46" rx="8" fill="#e8f1fc" stroke="#2a78d6" stroke-width="1.5"/>
<text x="86" y="196" font-size="13.5" font-weight="700" fill="#0b0b0b">factorial(3)</text>
<text x="86" y="214" font-size="11.5" fill="#52514e">3 * factorial(2)</text>
<path d="M175.0,222 L175.0,242" stroke="#eb6834" stroke-width="1.8"/>
<path d="M170.0,235 L180.0,235 L175.0,241 Z" fill="#eb6834"/>
<rect x="70" y="242" width="210" height="46" rx="8" fill="#e8f1fc" stroke="#2a78d6" stroke-width="1.5"/>
<text x="86" y="262" font-size="13.5" font-weight="700" fill="#0b0b0b">factorial(2)</text>
<text x="86" y="280" font-size="11.5" fill="#52514e">2 * factorial(1)</text>
<path d="M175.0,288 L175.0,308" stroke="#eb6834" stroke-width="1.8"/>
<path d="M170.0,301 L180.0,301 L175.0,307 Z" fill="#eb6834"/>
<rect x="70" y="308" width="210" height="46" rx="8" fill="#e8f1fc" stroke="#008300" stroke-width="2.0"/>
<text x="86" y="328" font-size="13.5" font-weight="700" fill="#0b0b0b">factorial(1)</text>
<text x="86" y="346" font-size="11.5" fill="#52514e">return 1  ← base</text>
<text x="175.0" y="382" font-size="11.5" font-weight="600" fill="#eb6834" text-anchor="middle">↓ 호출이 깊어짐</text>
<text x="400" y="96" font-size="13" font-weight="700" fill="#52514e">호출 스택 (동시에 쌓인 프레임)</text>
<rect x="400" y="300" width="230" height="40" rx="0" fill="#e8f1fc" stroke="#2a78d6" stroke-width="1.3"/>
<text x="414" y="318" font-size="12.5" font-weight="600" fill="#0b0b0b">factorial(4) 프레임</text>
<text x="414" y="333" font-size="10.5" fill="#52514e">지역변수 n · 복귀 주소</text>
<rect x="400" y="260" width="230" height="40" rx="0" fill="#e8f1fc" stroke="#2a78d6" stroke-width="1.3"/>
<text x="414" y="278" font-size="12.5" font-weight="600" fill="#0b0b0b">factorial(3) 프레임</text>
<text x="414" y="293" font-size="10.5" fill="#52514e">지역변수 n · 복귀 주소</text>
<rect x="400" y="220" width="230" height="40" rx="0" fill="#e8f1fc" stroke="#2a78d6" stroke-width="1.3"/>
<text x="414" y="238" font-size="12.5" font-weight="600" fill="#0b0b0b">factorial(2) 프레임</text>
<text x="414" y="253" font-size="10.5" fill="#52514e">지역변수 n · 복귀 주소</text>
<rect x="400" y="180" width="230" height="40" rx="0" fill="#e8f1fc" stroke="#2a78d6" stroke-width="1.3"/>
<text x="414" y="198" font-size="12.5" font-weight="600" fill="#0b0b0b">factorial(1) 프레임</text>
<text x="414" y="213" font-size="10.5" fill="#52514e">지역변수 n · 복귀 주소</text>
<line x1="394" y1="340" x2="636" y2="340" stroke="#0b0b0b" stroke-width="2"/>
<text x="515.0" y="360" font-size="11" fill="#52514e" text-anchor="middle">스택 바닥</text>
<path d="M652,180 h8 v160 h-8" fill="none" stroke="#008300" stroke-width="1.8"/>
<text x="666" y="254.0" font-size="13" font-weight="700" fill="#008300">깊이 = n</text>
<text x="666" y="272.0" font-size="13" font-weight="700" fill="#008300">→ O(n) 공간</text>
</svg>